# Baut die Standalone-Binaries (mac/win/linux) und hängt sie an ein Release.
#
# Hinweis: Diese Workflow-Datei liegt im Unterprojekt. Damit GitHub Actions sie
# ausführt, muss sie unter .github/workflows/ im REPO-ROOT liegen. Beim
# Herauslösen in ein eigenes Repo ist sie bereits korrekt platziert; im
# Monorepo entweder hierher kopieren/symlinken oder das Projekt herauslösen.
#
# Auslöser: Tag wie  esp32-monitor-v0.2.0
name: esp32-claude-monitor release

on:
  push:
    tags:
      - "esp32-monitor-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: esp32-claude-monitor/bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Build standalone binaries (mac/win/linux)
        run: npm run package
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-monitor-binaries
          path: esp32-claude-monitor/bridge/dist/*
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: esp32-claude-monitor/bridge/dist/*
