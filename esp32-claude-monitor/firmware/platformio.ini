; ESP32 Claude Monitor – Firmware
; Board: Waveshare ESP32-C6-LCD-1.47 (172x320, ST7789)
;
; Der ESP32-C6 braucht Arduino-Core 3.x. Der offizielle espressif32-Platform-
; Eintrag unterstuetzt C6 erst spaet -> wir nutzen den pioarduino-Fork.

[env:esp32-c6-lcd-1_47]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags =
  -D LV_CONF_INCLUDE_SIMPLE
  -I include
  -D ARDUINO_USB_CDC_ON_BOOT=1   ; serieller Monitor ueber USB-C

lib_deps =
  lvgl/lvgl@^8.3.11
  moononournation/GFX Library for Arduino@^1.4.9
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.2.0
